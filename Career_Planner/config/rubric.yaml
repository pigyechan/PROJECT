axes:
  evidence:
    weight: 0.20
    description: "주장이 채용공고 근거에 기반하며, 회사의 내적 문제(감정)까지 언급하는가"
    scale:
      1: "주장에 채용공고 근거 없음. 또는 외적 문제만 나열하고 내적 문제(감정)가 전혀 없음"
      3: "일부 근거 있으나 불분명. 내적 문제가 언급되나 표면적 수준에 그침"
      5: "모든 주장에 근거가 있고, 외적 문제 + 내적 문제(채용 담당자가 느끼는 감정·두려움)가 명확히 포함됨"
  alignment:
    weight: 0.20
    description: "포지셔닝이 추출한 역량 패턴(표면 스킬 + 숨은 기대치 패턴)과 일치하는가"
    scale:
      1: "포지셔닝이 추출된 패턴과 불일치하거나, 패턴을 무시함"
      3: "일부 패턴만 반영, 핵심 역량이 빠졌거나 숨은 기대치 패턴이 반영 안 됨"
      5: "표면 스킬 상위 패턴과 숨은 기대치 패턴이 포지셔닝 전반에 일관되게 반영됨"
  authenticity:
    weight: 0.20
    description: "가이드 역량이 실제 경력(반도체·C#·그릿)과 일치하는가"
    scale:
      1: "경력에 없는 역량을 가이드로 제시, 또는 실제 경력이 전혀 반영 안 됨"
      3: "경력과 부분 일치하나 과장되거나 근거가 약한 역량 포함"
      5: "가이드 역량이 실제 경력에서 직접 도출되고 구체적으로 연결됨"
  completeness:
    weight: 0.15
    description: "StoryBrand 7요소가 모두 포함되고, 지원자가 가이드(조력자) 포지션으로 프레임되는가"
    scale:
      1: "7요소 중 2개 이상 누락. 또는 지원자가 주인공처럼 서술됨 (자기중심 문장 다수)"
      3: "요소는 갖췄으나 지원자가 주인공/가이드 경계가 흐릿함"
      5: "7요소 모두 포함. 회사가 주인공, 지원자가 조력자 역할로 일관되게 프레임됨"
  differentiation:
    weight: 0.15
    description: "고유 관점이 있고, 핵심 메시지를 1문장으로 요약할 수 있을 만큼 단순한가"
    scale:
      1: "일반론 나열. 전환 맥락 없음. 메시지가 복잡하고 무엇을 말하는지 불분명"
      3: "전환 스토리가 있으나 메시지가 여러 방향으로 분산되어 핵심이 흐릿함"
      5: "반도체+백엔드+그릿이 하나의 서사로 연결되고, 전체를 1문장으로 요약 가능한 수준의 단순함"
  specificity:
    weight: 0.10
    description: "계획(90일)과 CTA가 구체적이고 실행 가능한가"
    scale:
      1: "계획도 모호하고 CTA도 '연락 주세요' 수준으로 행동 불가"
      3: "계획이나 CTA 중 하나는 구체적이나 나머지가 모호함"
      5: "90일 계획에 기간·산출물·우선순위가 있고, CTA는 무엇을/왜 지금/어떻게를 포함"

pass_threshold:
  evaluator: 2.8
  validator: 2.5

validator_rules:
  min_chars: 500
  max_chars: 3000
  forbidden_words:
    - "무조건"
    - "완벽보장"
    - "절대안전"
    - "반드시성공"
    - "최고의"
