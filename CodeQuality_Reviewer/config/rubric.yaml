version: 1
axes:
  - name: diagnostic_accuracy
    weight: 0.30
    scale:
      1: "위반이라고 지목한 것이 실제로는 위반이 아니거나, 핵심 위반(SRP/DIP 등)을 놓침"
      3: "주요 위반은 짚었으나 근거(evidence)가 막연하거나 일부 위반 누락"
      5: "모든 주요 SOLID/Anemic 위반을 정확히 짚고, 각각 코드 인용 등 구체적 근거를 제시"

  - name: minimal_change
    weight: 0.25
    scale:
      1: "위반과 무관한 부분까지 광범위하게 뜯어고치거나, 필요 이상의 추상화(인터페이스·레이어)를 추가 제안"
      3: "대체로 필요한 범위지만 일부 제안이 과설계이거나 범위를 벗어남"
      5: "지적한 위반을 해소하는 데 필요한 최소 범위로만 제안 (Fowler 기법 단위로 쪼개짐)"

  - name: behavior_preservation
    weight: 0.25
    scale:
      1: "제안을 그대로 적용하면 기존 동작(순서·예외·반환값)이 바뀔 위험이 크거나 언급조차 없음"
      3: "위험 가능성은 있으나 완화 방법이나 주의사항을 일부 언급"
      5: "동작 보존을 위해 지켜야 할 순서/제약을 명시하고, 안전하게 적용 가능한 근거를 제시"

  - name: testability_improvement
    weight: 0.20
    scale:
      1: "제안을 적용해도 단위 테스트 용이성에 변화가 없거나 오히려 테스트하기 어려워짐"
      3: "일부 개선되지만 여전히 외부 의존성을 모킹하기 어려운 부분이 남음"
      5: "제안 적용 시 도메인 로직을 외부 I/O 없이 단위 테스트할 수 있게 되는 지점을 구체적으로 설명"

min_total: 2.5
notes: |
  - min_total 미만이면 validate.py가 REJECT
  - 평가자 프롬프트에는 '5점은 드뭅니다. 평균 3.0 기준' 문구 포함 필수
  - 가중치 합 검증은 evaluator.py 로딩 시 1회 수행 (assert)
  - Test_Writer(1-1) rubric.yaml과 동일한 axes 리스트 + weight + scale 형식을 그대로 재사용했다.
    도메인에 맞는 4개 축(진단 정확도/변경 최소성/행위 보존 위험도/테스트 용이성 개선)으로 이름과
    기준만 교체했다.
