# rubric.yaml · DeckBrew Newsletter Pipeline · 2026-04-17 버전
version: 1
axes:
  - name: structure
    weight: 0.15
    scale:
      1: "주장·근거·예시 구분 없이 한 덩어리"
      3: "구분은 있으나 하나가 과도하게 짧거나 길다"
      5: "3요소 균형 + 결론까지 명시적으로 분리"

  - name: evidence
    weight: 0.20
    scale:
      1: "모든 주장에 근거 없음, 또는 materials에 없는 내용을 사실처럼 서술"
      3: "일부 주장에만 근거, 근거가 materials 범위 안인지 불분명"
      5: "모든 주장에 근거가 있으며 해당 근거가 materials 안에 있는 내용임"

  - name: tone
    weight: 0.15
    scale:
      1: "브랜드 톤에서 이탈한 구어체·외국어 혼재"
      3: "대부분 톤 유지, 한두 문장에서 이탈"
      5: "전체 문서가 브랜드 보이스 가이드 준수"

  - name: hook
    weight: 0.15
    scale:
      1: "배경 설명으로 시작, 첫 문단 지나도 핵심 안 나옴"
      3: "두 번째 문단에서 핵심 등장"
      5: "첫 문장부터 독자 상황 직격"

  - name: uniqueness
    weight: 0.15
    scale:
      1: "일반론 나열, 이 뉴스레터만의 관점 없음"
      3: "저자 고유 관점 한 군데 등장"
      5: "여러 문단에 저자 고유 비유·조어 등장"

  - name: actionability
    weight: 0.10
    scale:
      1: "독자가 읽고 난 뒤 무엇을 할지 모호"
      3: "다음 행동이 암시되나 구체적이지 않음"
      5: "다음 행동이 명시적으로 제시, 소요 시간까지"

  - name: length_calibration
    weight: 0.10
    scale:
      1: "의도 길이의 50% 미만 또는 200% 초과"
      3: "의도 범위 안이나 밀도가 고르지 않음"
      5: "의도 범위 안 + 문단별 밀도 균일"

min_total: 2.8
notes: |
  - min_total 미만이면 validate.py가 REJECT
  - 평가자 프롬프트에는 '5점은 드뭅니다. 평균 3.0 기준' 문구 포함 필수
  - 가중치 합 검증은 validate.py 실행 시 1회 수행 (assert)

precision_rules:
  description: "기술 블로그에서 도메인 용어를 혼용하면 evidence 점수를 1점 감점한다"
  violations:
    - wrong: "인수테스트 결과를 RED/GREEN으로 표현"
      correct: "PASS/FAIL"
      reason: "RED→GREEN→REFACTOR는 TDD 개발 사이클 전용 용어"
    - wrong: "단위 테스트와 인수테스트 혼용"
      correct: "각각의 정확한 명칭"
      reason: "범위와 목적이 다름"
    - wrong: "mock, stub, fake 혼용"
      correct: "각각의 정확한 명칭"
      reason: "테스트 더블 종류별 의미가 다름"
