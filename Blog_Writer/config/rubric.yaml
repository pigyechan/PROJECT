# rubric.yaml · Blog_Writer Pipeline
version: 1
axes:
  - name: structure
    weight: 0.15
    scale:
      1: "주장·근거·예시 구분 없이 한 덩어리. 흐름을 따라갈 수 없음"
      2: "구분은 시도했으나 하나의 요소(예: 근거 또는 예시)가 완전히 빠짐"
      3: "3요소 모두 있으나 하나가 과도하게 짧거나 반복됨"
      4: "3요소 균형 잡혀 있으나 결론이 명시적으로 분리되지 않음"
      5: "주장·근거·예시 3요소 균형 + 결론까지 명시적으로 분리됨"

  - name: evidence
    weight: 0.30
    scale:
      1: "모든 주장에 근거 없음. 또는 materials에 없는 내용을 사실처럼 서술"
      2: "일부 주장에만 근거 있음. 근거 중 materials 범위를 벗어난 것이 포함됨"
      3: "대부분의 주장에 근거 있으나, 한두 곳에서 근거가 불분명하거나 과장됨"
      4: "모든 주장에 근거가 있고 materials 범위 안임. 단, 수치나 구체적 예시가 부족한 부분이 있음"
      5: "모든 주장에 근거가 있으며 materials 범위 내 구체적 수치·예시·경험으로 뒷받침됨"

  - name: tone
    weight: 0.15
    scale:
      1: "브랜드 톤에서 크게 이탈. 구어체·외국어·은어 혼재"
      2: "전반적 톤은 유지되나 여러 문단에서 이탈이 눈에 띔"
      3: "대부분 톤 유지. 한두 문장에서 이탈"
      4: "거의 전체가 톤 유지. 세밀한 어조 조정이 필요한 표현이 1개 이하"
      5: "전체 문서가 브랜드 보이스 가이드를 완전히 준수함"

  - name: hook
    weight: 0.15
    scale:
      1: "배경 설명으로 시작. 첫 문단이 지나도 핵심이 나오지 않음"
      2: "첫 문단 후반부에서 핵심이 등장하나 독자 관심을 끌기에 약함"
      3: "두 번째 문단에서 핵심 등장. 첫 문장은 일반론으로 시작"
      4: "첫 문단 첫 문장에 핵심이 있으나 독자의 구체적 상황을 직접 건드리지 않음"
      5: "첫 문장부터 독자의 구체적 상황이나 고통을 직격함"

  - name: uniqueness
    weight: 0.15
    scale:
      1: "일반론 나열. 이 글만의 관점·경험·비유가 전혀 없음"
      2: "저자 고유 관점이 암시되나 명확하게 표현되지 않음"
      3: "저자 고유 관점이 한 군데 명확하게 등장"
      4: "두 군데 이상 저자만의 관점·비유·경험이 등장하나 일관성이 약함"
      5: "여러 문단에 걸쳐 저자 고유 관점·비유·조어가 일관되게 등장"

  - name: actionability
    weight: 0.05
    scale:
      1: "독자가 읽고 난 뒤 무엇을 할지 전혀 모호함"
      2: "행동 방향이 암시되나 독자가 스스로 해석해야 함"
      3: "다음 행동이 제시되나 구체적이지 않음 (예: '고민해보세요')"
      4: "구체적 행동이 제시되나 우선순위나 소요 시간이 없음"
      5: "다음 행동이 명시적이고 구체적으로 제시됨 (무엇을, 언제, 어떻게)"

  - name: length_calibration
    weight: 0.05
    scale:
      1: "의도 길이의 50% 미만 또는 200% 초과"
      2: "의도 길이의 50~70% 또는 170~200% 범위. 분량이 내용 밀도에 비해 크게 어긋남"
      3: "의도 범위 안이나 문단 밀도가 고르지 않음 (어떤 섹션은 길고 어떤 섹션은 너무 짧음)"
      4: "의도 범위 안이고 밀도가 대체로 균일하나 한두 문단에서 불균형이 느껴짐"
      5: "의도 범위 안 + 모든 문단의 밀도가 균일함"

min_total: 2.8
notes: |
  - min_total 미만이면 validate.py가 REJECT
  - 평가자 프롬프트에는 '5점은 드뭅니다. 평균 3.0 기준' 문구 포함 필수
  - 가중치 합 검증은 validate.py 실행 시 1회 수행 (assert)

precision_rules:
  description: "기술 블로그에서 도메인 용어를 혼용하면 evidence 점수를 1점 감점한다"
  violations:
    - wrong: "인수테스트 결과를 RED/GREEN으로 표현"
      correct: "PASS/FAIL"
      reason: "RED→GREEN→REFACTOR는 TDD 개발 사이클 전용 용어"
    - wrong: "단위 테스트와 인수테스트 혼용"
      correct: "각각의 정확한 명칭"
      reason: "범위와 목적이 다름"
    - wrong: "mock, stub, fake 혼용"
      correct: "각각의 정확한 명칭"
      reason: "테스트 더블 종류별 의미가 다름"
